server.port=8081

# H2 Console exposed publicly (VULNERABILITY: info disclosure / unauth access)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.datasource.url=jdbc:h2:mem:goatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
# VULNERABILITY: Hardcoded DB credentials
spring.datasource.username=sa
spring.datasource.password=password123

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# VULNERABILITY: Full error stack traces exposed to clients
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true

# Thymeleaf - caching disabled (assists SSTI testing)
spring.thymeleaf.cache=false

# VULNERABILITY: Actuator endpoints fully exposed
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.show-values=always

# VULNERABILITY: Hardcoded secret key in config
